# =============================================================
# Telegram Paper Search Bot — GitHub Actions 워크플로우
# ⚠️ 이 워크플로우는 ANTHROPIC_API_KEY (pay-per-use API) 를 사용합니다.
#    Max 플랜만 쓰려는 정책에 따라 스케줄 비활성화. 수동 실행도 권장하지 않음.
#    이 봇을 다시 쓰려면 Claude Code Action (OAuth 토큰) 기반으로 재작성 필요.
# =============================================================

name: Telegram Bot (On-Demand Search) [DISABLED — uses API]

on:
  # 스케줄 비활성화 — API 사용 중단
  # schedule:
  #   - cron: '*/5 * * * *'

  # 수동 실행 버튼 (실행 시 API 크레딧 소모됨, 주의)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # 5분 안에 반드시 종료

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot (one polling cycle)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          CI: 'true'
        run: python bot_server.py

      - name: Commit bot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .bot_state.json
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
