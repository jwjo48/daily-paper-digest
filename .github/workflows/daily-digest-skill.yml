# =============================================================
# Daily Paper Digest — Claude Code Skill 자동화 워크플로우
# 매일 오전 7시 EST 자동 실행 (주말 포함)
# =============================================================

name: Daily Paper Digest Skill

on:
  schedule:
    # 7am EST = 12:00 UTC
    # ⚠️ DST 기간 (EDT, UTC-4): 이 시간은 8am EDT가 됨
    #    7am EDT를 원하면 '0 11 * * *' 로 변경
    - cron: '0 12 * * *'

  # 수동 실행 버튼 (GitHub Actions 탭에서)
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # OIDC 인증 (claude-code-action 요구사항)

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate papers + write digest.json (Claude, Max plan)
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: 'agent'
          allowed_tools: "Bash,Read,Write,Edit"
          direct_prompt: |
            Collect today's papers, evaluate them, and write staging/digest.json. Today's date is in system context.

            ⚠️ DO NOT touch papers/ directory.
            ⚠️ DO NOT send any Telegram message — that happens in a later workflow step.
            ⚠️ DO NOT make any git commits — that happens in a later workflow step.

            Steps:

            1. Run `python3 collect_papers.py` to collect papers into staging/latest.json.

            2. Read staging/latest.json. For each paper, evaluate:
               - relevance (1-10 integer)
               - 4-section Korean summary: background, methods, results, conclusion (1-2 sentences each)
               - connection: 1-sentence English research connection
               - category: one of human_ai_collab | public_benefits_tech | low_income_populations | participatory_design | algorithmic_fairness | llm_applications | ai_general
               Use the researcher context from `.claude/skills/daily-digest/SKILL.md`.

            3. Keep only papers with relevance ≥ 6, sorted highest first.

            4. List subdirectories of `papers/` alphabetically (use `ls papers/`), assign letters A, B, C, ... to each.

            5. Write `staging/digest.json` with this exact structure:
               {
                 "date": "YYYY-MM-DD",
                 "folders": {"A": "<folder name>", "B": "...", ...},
                 "papers": [
                   {
                     "number": 1,
                     "title": "...", "authors": "...", "url": "...", "venue": "...", "date": "...",
                     "relevance": 9, "category": "human_ai_collab",
                     "background": "...", "methods": "...", "results": "...", "conclusion": "...",
                     "connection": "..."
                   },
                   ...
                 ]
               }

            6. If NO papers met the threshold, write `staging/digest.json` with an empty papers array but still include date + folders.

            7. Print a short summary to stdout: "Wrote N papers to staging/digest.json".

            That's it. No Telegram, no git, no papers/ writes. Just digest.json.

      - name: Send digest to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 send_digest_telegram.py

      - name: Commit digest.json
        if: success()
        run: |
          if [ ! -f staging/digest.json ]; then
            echo "No digest.json — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add staging/digest.json
          if git diff --cached --quiet; then
            echo "digest.json unchanged — nothing to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          N=$(python3 -c "import json; print(len(json.load(open('staging/digest.json')).get('papers', [])))")
          git commit -m "digest: ${DATE} (${N} papers)"
          git push
