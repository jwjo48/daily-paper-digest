# =============================================================
# Daily Paper Digest — 레거시 워크플로우 (daily_digest.py 사용)
# ⚠️ 이 워크플로우는 ANTHROPIC_API_KEY (pay-per-use API) 를 사용합니다.
#    Max 플랜만 쓰려는 정책에 따라 스케줄 + 수동 실행 모두 비활성화.
#    실제 자동화는 daily-digest-skill.yml (OAuth 토큰) 사용.
# =============================================================

name: Daily Paper Digest (Legacy) [DISABLED — uses API]

on:
  # 스케줄 비활성화 — API 사용 중단
  # schedule:
  #   - cron: '0 12 * * 1-5'

  # 수동 실행 버튼 (실행 시 API 크레딧 소모됨, 주의)
  workflow_dispatch:

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          CI: 'true'
        run: python daily_digest.py

      # (선택) 생성된 마크다운을 artifact로 저장
      # 나중에 다운로드해서 vault에 넣을 수 있음
      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-digest-${{ github.run_number }}
          path: /tmp/daily-papers/
          retention-days: 30
          if-no-files-found: ignore
